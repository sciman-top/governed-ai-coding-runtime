name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-integrity:
    name: Repository integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install repo hooks
        shell: pwsh
        run: ./scripts/install-repo-hooks.ps1

      - name: Run repository verification
        shell: pwsh
        run: ./scripts/verify-repo.ps1 -Check All
