name: Verify

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-integrity:
    name: Repository integrity
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Enable long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install repo hooks
        shell: pwsh
        run: ./scripts/install-repo-hooks.ps1

      - name: Run repository verification
        shell: pwsh
        env:
          GACR_HOST_FEEDBACK_FIXTURE: tests/fixtures/host-feedback/clean-windows-runner.json
        run: ./scripts/verify-repo.ps1 -Check All

  release-preflight:
    name: Release preflight
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Enable long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run release preflight
        shell: pwsh
        env:
          GACR_HOST_FEEDBACK_FIXTURE: tests/fixtures/host-feedback/clean-windows-runner.json
        run: ./scripts/governance/preflight.ps1 -DisableAutoCommit
